name: Cập nhật dữ liệu YouTube Trending VN

on:
  # Cho phép kích hoạt thủ công từ tab Actions hoặc GitHub API
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Sử dụng Node 24 LTS
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Fetch YouTube Data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npm run fetch

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          # Chỉ commit nếu có sự thay đổi trong data.json
          git commit -m "Auto-update: YouTube Trending Data [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push
